# Verify Chrome Web Store API credentials (read-only, no upload).
#
# Manually triggered to confirm the 4 Chrome Secrets are correctly configured
# BEFORE relying on release.yml for a real publish. Exchanges the OAuth refresh
# token for an access token, then calls the read-only Items.get endpoint.
#
# - No upload, no publish, no version bump -> safe to run any time (no conflict
#   with the v0.3.0 currently in review).
# - Prints only non-sensitive item fields (id/status/version); never echoes the
#   access token or any credential value.
#
# Trigger: Actions tab -> "Verify Chrome Secrets" -> Run workflow.
# Required secrets (same 4 as release.yml Chrome upload):
#   CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN, CHROME_ITEM_ID
#
# What success proves:
#   - CLIENT_ID / CLIENT_SECRET / REFRESH_TOKEN are valid (OAuth token exchange works)
#   - CHROME_ITEM_ID is correct and the item is owned by this OAuth account

name: Verify Chrome Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify Chrome Web Store credentials
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets are present
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_ITEM_ID }}
        run: |
          MISSING=""
          [ -z "$CLIENT_ID" ] && MISSING="$MISSING CHROME_CLIENT_ID"
          [ -z "$CLIENT_SECRET" ] && MISSING="$MISSING CHROME_CLIENT_SECRET"
          [ -z "$REFRESH_TOKEN" ] && MISSING="$MISSING CHROME_REFRESH_TOKEN"
          [ -z "$EXTENSION_ID" ] && MISSING="$MISSING CHROME_ITEM_ID"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing GitHub Secrets:$MISSING"
            echo "Configure in: Repository Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          echo "✓ All 4 Chrome secrets are present"

      - name: Exchange token & look up extension item (read-only)
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_ITEM_ID }}
        run: |
          # 1. Exchange refresh token for an access token.
          # Token stays in a shell variable only — never written to GITHUB_ENV or echoed.
          TOKEN_RESP=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CLIENT_ID" \
            -d client_secret="$CLIENT_SECRET" \
            -d refresh_token="$REFRESH_TOKEN" \
            -d grant_type=refresh_token)
          TOKEN=$(echo "$TOKEN_RESP" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::Failed to obtain access token — OAuth credentials invalid."
            echo "Error: $(echo "$TOKEN_RESP" | jq -r '.error // "unknown"') — $(echo "$TOKEN_RESP" | jq -r '.error_description // ""')"
            echo "Likely causes: wrong CLIENT_ID/CLIENT_SECRET, expired/invalid REFRESH_TOKEN,"
            echo "or Chrome Web Store API not enabled in the GCP project."
            exit 1
          fi
          echo "✓ Access token obtained (CLIENT_ID / CLIENT_SECRET / REFRESH_TOKEN valid)"

          # 2. Read-only item lookup. projection=draft requires owner scope, so a
          # 200 here also proves the item is owned by this OAuth account.
          RESP=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer $TOKEN" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID?projection=draft")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Item lookup failed (HTTP $HTTP_CODE)"
            echo "$BODY" | jq '{error, error_description, message}' 2>/dev/null || echo "$BODY"
            echo "Likely causes: wrong CHROME_ITEM_ID, or item not owned by this OAuth account."
            exit 1
          fi
          echo "✓ Item found — CHROME_ITEM_ID valid and owned by this account"
          echo ""
          echo "=== Extension item info ==="
          echo "$BODY" | jq '{itemId: .id, kind: .kind, status: .status, publicVersion: .publicVersion, draftVersion: .draftVersion}'
