# Browser Extension Release Pipeline (Issue #63 + #68)
#
# Responds to GitHub Release "published" events (created by prodflow-release-deploy).
# Builds, packages, and uploads Chrome / Firefox / Edge extension zips to the Release,
# then publishes to each browser's store (skipped for prerelease / dry-run).
#
# Triggers:
#   - release [published]: automatic, when a GitHub Release is published
#   - workflow_dispatch:   manual, with tag + dry-run inputs
#
# Build matrix (consumes #67 build commands and output paths):
#   Chrome  - pnpm build         -> .output/chrome-mv3/   -> pnpm zip         -> *-chrome.zip
#   Firefox - pnpm build:firefox -> .output/firefox-mv2/  -> pnpm zip:firefox -> *-firefox.zip
#   Edge    - pnpm build:edge    -> .output/edge-mv3/     -> pnpm zip:edge    -> *-edge.zip
#
# Dry-run mode (workflow_dispatch, dry-run=true):
#   Verifies version consistency, builds all three browsers, packages, uploads zips
#   to GitHub Release. Skips all store API calls (Chrome Web Store / AMO / Edge Add-ons).
#   The specified tag must correspond to an existing GitHub Release.
#
# Prerelease handling:
#   prerelease Releases run build + package + Release asset upload for all browsers,
#   but skip all store uploads (Chrome Web Store / AMO / Edge Add-ons).
#
# Required GitHub Secrets (for store upload only):
#
#   Chrome Web Store (#63):
#     CHROME_CLIENT_ID      - Google OAuth2 client ID
#     CHROME_CLIENT_SECRET  - Google OAuth2 client secret
#     CHROME_REFRESH_TOKEN  - OAuth2 refresh token
#     CHROME_ITEM_ID        - Chrome Web Store extension ID (EXTENSION_ID)
#
#   AMO / Firefox Add-ons (#68):
#     AMO_API_KEY           - AMO JWT issuer (API key)
#     AMO_API_SECRET        - AMO JWT secret
#
#   Edge Add-ons (#68):
#     EDGE_PRODUCT_ID       - Edge Add-ons extension product ID
#     EDGE_CLIENT_ID        - Azure AD app client ID
#     EDGE_CLIENT_SECRET    - Azure AD app client secret
#     EDGE_TENANT_ID        - Azure AD tenant ID
#
#   Secret setup guides:
#     Chrome: https://github.com/fregante/chrome-webstore-upload-keys
#     AMO:    https://addons.mozilla.org/developers/ -> API Keys
#     Edge:   Azure AD app registration + Edge Partner Center
#
# Troubleshooting:
#   - Version mismatch: ensure tag (vX.Y.Z), package.json version, and
#     wxt.config.ts manifest.version all match (without the "v" prefix).
#   - Missing secrets: configure in Repository Settings -> Secrets and variables -> Actions.
#     Each browser checks its own secrets independently before upload.
#   - "Release not found": the tag must correspond to an existing GitHub Release.
#   - Chrome upload fails: verify OAuth credentials are valid and not expired.
#   - AMO upload fails: verify AMO_API_KEY/AMO_API_SECRET; check AMO API status.
#     AMO may require source code submission during review (separate from this workflow).
#   - Edge upload fails: verify Azure AD credentials; check Edge Add-ons API status.
#   - Single browser failure: matrix uses fail-fast:false, so other browsers complete.
#     Re-run the failed matrix entry (re-run failed jobs) after fixing the issue.
#   - Release asset already exists: upload uses --clobber to overwrite on re-run.

name: Release Browser Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.3.0) - must correspond to an existing GitHub Release'
        required: true
        type: string
      dry-run:
        description: 'Dry-run: skip all store uploads (Chrome/Firefox/Edge)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-extension-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish - ${{ matrix.browser }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # ----------------------------------------------------------------
      # Determine release context: tag, prerelease flag, and whether
      # store upload should run. Shared across all browsers (same as #63).
      # ----------------------------------------------------------------
      - name: Determine release context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            PRERELEASE="${{ github.event.release.prerelease }}"
          else
            TAG="${{ inputs.tag }}"
            PRERELEASE="false"
          fi

          # Store upload runs only for formal (non-prerelease) releases,
          # or manual triggers with dry-run=false.
          if [ "$PRERELEASE" = "true" ]; then
            UPLOAD_STORE="false"
          elif [ "${{ github.event_name }}" = "release" ]; then
            UPLOAD_STORE="true"
          elif [ "${{ inputs.dry-run }}" = "false" ]; then
            UPLOAD_STORE="true"
          else
            UPLOAD_STORE="false"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "upload_store=$UPLOAD_STORE" >> "$GITHUB_OUTPUT"

          echo "=== Release Context ==="
          echo "Browser: ${{ matrix.browser }}"
          echo "Event: ${{ github.event_name }}"
          echo "Tag: $TAG"
          echo "Prerelease: $PRERELEASE"
          echo "Upload to store: $UPLOAD_STORE"

      # ----------------------------------------------------------------
      # Version consistency check: tag vs package.json vs wxt manifest.
      # Fails with a clear, non-sensitive error if any mismatch.
      # Shared across all browsers (same as #63).
      # ----------------------------------------------------------------
      - name: Verify version consistency
        env:
          TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          # Extract SemVer from tag (strip leading 'v')
          TAG_VERSION="${TAG#v}"

          # Read version from package.json
          PKG_VERSION=$(node -p "require('./package.json').version")

          # Read version from wxt.config.ts manifest (version: 'x.y.z')
          MANIFEST_VERSION=$(grep -oP "version:\s*['\"]\K[^'\"]+" wxt.config.ts | head -1)

          echo "Tag version:          $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          echo "manifest version:     $MANIFEST_VERSION"

          if [ -z "$MANIFEST_VERSION" ]; then
            echo "::error::Could not extract version from wxt.config.ts"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch: tag ($TAG_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Version mismatch: tag ($TAG_VERSION) != wxt.config.ts manifest ($MANIFEST_VERSION)"
            exit 1
          fi

          echo "✓ All versions consistent: $TAG_VERSION"

      # ----------------------------------------------------------------
      # Build extension for the target browser (consumes #67 commands).
      # ----------------------------------------------------------------
      - name: Build extension (${{ matrix.browser }})
        run: |
          case "${{ matrix.browser }}" in
            chrome)  pnpm build ;;
            firefox) pnpm build:firefox ;;
            edge)    pnpm build:edge ;;
          esac

      # ----------------------------------------------------------------
      # Package zip for the target browser (consumes #67 commands).
      # ----------------------------------------------------------------
      - name: Package zip (${{ matrix.browser }})
        run: |
          case "${{ matrix.browser }}" in
            chrome)  pnpm zip ;;
            firefox) pnpm zip:firefox ;;
            edge)    pnpm zip:edge ;;
          esac

      # ----------------------------------------------------------------
      # Locate the built zip artifact by browser suffix.
      # ----------------------------------------------------------------
      - name: Locate zip artifact
        id: zip
        run: |
          ZIP_FILE=$(find .output -name "*-${{ matrix.browser }}.zip" -print -quit)
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::No ${{ matrix.browser }} zip found in .output/"
            ls -la .output/ || true
            exit 1
          fi
          echo "path=$ZIP_FILE" >> "$GITHUB_OUTPUT"
          echo "Found zip: $ZIP_FILE"

      # ----------------------------------------------------------------
      # Upload zip to the existing GitHub Release.
      # Does NOT create a tag or Release (prodflow-release-deploy does that).
      # --clobber overwrites on re-run (same as #63).
      # ----------------------------------------------------------------
      - name: Upload zip to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ctx.outputs.tag }}
        run: |
          gh release upload "$TAG" "${{ steps.zip.outputs.path }}" --clobber
          echo "✓ Uploaded ${{ steps.zip.outputs.path }} to Release $TAG"

      # ----------------------------------------------------------------
      # Skip store upload for prerelease / dry-run.
      # ----------------------------------------------------------------
      - name: Skip store upload
        if: steps.ctx.outputs.upload_store == 'false'
        run: |
          echo "-> Skipping ${{ matrix.browser }} store upload"
          if [ "${{ steps.ctx.outputs.prerelease }}" = "true" ]; then
            echo "  Reason: prerelease Release"
          else
            echo "  Reason: dry-run mode (workflow_dispatch with dry-run=true)"
          fi

      # ================================================================
      # Chrome Web Store (#63 - unchanged logic, conditional on browser)
      # ================================================================

      # ----------------------------------------------------------------
      # Verify Chrome Web Store secrets before upload.
      # Only prints variable NAMES (never values) on failure.
      # ----------------------------------------------------------------
      - name: Check Chrome Web Store secrets
        if: matrix.browser == 'chrome' && steps.ctx.outputs.upload_store == 'true'
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_ITEM_ID }}
        run: |
          MISSING=""
          [ -z "$CLIENT_ID" ] && MISSING="$MISSING CHROME_CLIENT_ID"
          [ -z "$CLIENT_SECRET" ] && MISSING="$MISSING CHROME_CLIENT_SECRET"
          [ -z "$REFRESH_TOKEN" ] && MISSING="$MISSING CHROME_REFRESH_TOKEN"
          [ -z "$EXTENSION_ID" ] && MISSING="$MISSING CHROME_ITEM_ID"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required GitHub Secrets:$MISSING"
            echo ""
            echo "Configure in: Repository Settings -> Secrets and variables -> Actions"
            echo ""
            echo "Required secrets for Chrome Web Store upload:"
            echo "  CHROME_CLIENT_ID      - Google OAuth2 client ID"
            echo "  CHROME_CLIENT_SECRET  - Google OAuth2 client secret"
            echo "  CHROME_REFRESH_TOKEN  - OAuth2 refresh token"
            echo "  CHROME_ITEM_ID        - Chrome Web Store extension ID"
            echo ""
            echo "Guide: https://github.com/fregante/chrome-webstore-upload-keys"
            exit 1
          fi
          echo "✓ All required Chrome Web Store secrets are present"

      # ----------------------------------------------------------------
      # Upload and publish extension to Chrome Web Store.
      # Uses chrome-webstore-upload-cli v4 (Chrome Web Store API v2).
      # Credentials are passed via environment variables only.
      # ----------------------------------------------------------------
      - name: Upload and publish to Chrome Web Store
        if: matrix.browser == 'chrome' && steps.ctx.outputs.upload_store == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_ITEM_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx --yes chrome-webstore-upload-cli@4 --source "${{ steps.zip.outputs.path }}"
          echo "✓ Extension uploaded and published to Chrome Web Store"

      # ================================================================
      # AMO / Firefox Add-ons (#68 - new)
      # ================================================================

      # ----------------------------------------------------------------
      # Verify AMO secrets before upload.
      # Only prints variable NAMES (never values) on failure.
      # ----------------------------------------------------------------
      - name: Check AMO secrets
        if: matrix.browser == 'firefox' && steps.ctx.outputs.upload_store == 'true'
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          MISSING=""
          [ -z "$AMO_API_KEY" ] && MISSING="$MISSING AMO_API_KEY"
          [ -z "$AMO_API_SECRET" ] && MISSING="$MISSING AMO_API_SECRET"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required GitHub Secrets:$MISSING"
            echo ""
            echo "Configure in: Repository Settings -> Secrets and variables -> Actions"
            echo ""
            echo "Required secrets for AMO (Firefox Add-ons) upload:"
            echo "  AMO_API_KEY     - AMO JWT issuer (API key)"
            echo "  AMO_API_SECRET  - AMO JWT secret"
            echo ""
            echo "Guide: https://addons.mozilla.org/developers/ -> API Keys"
            exit 1
          fi
          echo "✓ All required AMO secrets are present"

      # ----------------------------------------------------------------
      # Upload and publish extension to AMO (Firefox Add-ons).
      # Uses web-ext sign (Mozilla official CLI).
      # --channel listed submits for AMO review and public listing.
      # Credentials are passed via environment variables only.
      # ----------------------------------------------------------------
      - name: Upload and publish to AMO
        if: matrix.browser == 'firefox' && steps.ctx.outputs.upload_store == 'true'
        env:
          AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
          AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
        run: |
          echo "-> Uploading Firefox extension to AMO..."
          npx --yes web-ext sign \
            --source-dir .output/firefox-mv2/ \
            --channel listed \
            --api-key "$AMO_API_KEY" \
            --api-secret "$AMO_API_SECRET" \
            --artifacts-dir .output/web-ext-artifacts
          echo "✓ Extension uploaded to AMO (listed channel)"

      # ================================================================
      # Edge Add-ons (#68 - new)
      # ================================================================

      # ----------------------------------------------------------------
      # Verify Edge Add-ons secrets before upload.
      # Only prints variable NAMES (never values) on failure.
      # ----------------------------------------------------------------
      - name: Check Edge Add-ons secrets
        if: matrix.browser == 'edge' && steps.ctx.outputs.upload_store == 'true'
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_CLIENT_SECRET: ${{ secrets.EDGE_CLIENT_SECRET }}
          EDGE_TENANT_ID: ${{ secrets.EDGE_TENANT_ID }}
        run: |
          MISSING=""
          [ -z "$EDGE_PRODUCT_ID" ] && MISSING="$MISSING EDGE_PRODUCT_ID"
          [ -z "$EDGE_CLIENT_ID" ] && MISSING="$MISSING EDGE_CLIENT_ID"
          [ -z "$EDGE_CLIENT_SECRET" ] && MISSING="$MISSING EDGE_CLIENT_SECRET"
          [ -z "$EDGE_TENANT_ID" ] && MISSING="$MISSING EDGE_TENANT_ID"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required GitHub Secrets:$MISSING"
            echo ""
            echo "Configure in: Repository Settings -> Secrets and variables -> Actions"
            echo ""
            echo "Required secrets for Edge Add-ons upload:"
            echo "  EDGE_PRODUCT_ID     - Edge Add-ons extension product ID"
            echo "  EDGE_CLIENT_ID      - Azure AD app client ID"
            echo "  EDGE_CLIENT_SECRET  - Azure AD app client secret"
            echo "  EDGE_TENANT_ID      - Azure AD tenant ID"
            echo ""
            echo "Guide: Azure AD app registration + Edge Partner Center"
            exit 1
          fi
          echo "✓ All required Edge Add-ons secrets are present"

      # ----------------------------------------------------------------
      # Upload and publish extension to Edge Add-ons via REST API.
      # Three-step flow: get Azure AD token -> upload package -> publish.
      # Credentials are passed via environment variables only; token is
      # never echoed.
      # ----------------------------------------------------------------
      - name: Upload and publish to Edge Add-ons
        if: matrix.browser == 'edge' && steps.ctx.outputs.upload_store == 'true'
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_CLIENT_SECRET: ${{ secrets.EDGE_CLIENT_SECRET }}
          EDGE_TENANT_ID: ${{ secrets.EDGE_TENANT_ID }}
          ZIP_PATH: ${{ steps.zip.outputs.path }}
        run: |
          # --- Step 1: Obtain Azure AD access token ---
          echo "-> Obtaining Edge Add-ons API access token..."
          TOKEN_RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${EDGE_TENANT_ID}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=${EDGE_CLIENT_ID}" \
            -d "client_secret=${EDGE_CLIENT_SECRET}" \
            -d "scope=https://api.addons.microsoftedge.com/.default")

          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::Failed to obtain Edge Add-ons API access token"
            echo "Response (non-sensitive fields only):"
            echo "$TOKEN_RESPONSE" | jq '{error, error_description}' 2>/dev/null || echo "(unable to parse response)"
            exit 1
          fi
          echo "✓ Access token obtained"

          # --- Step 2: Upload package to draft submission ---
          echo "-> Uploading Edge package to Edge Add-ons..."
          UPLOAD_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.addons.microsoftedge.com/v1/products/${EDGE_PRODUCT_ID}/submissions/draft/package" \
            -H "Authorization: Bearer ${TOKEN}" \
            -F "file=@${ZIP_PATH}")

          if [ "$UPLOAD_HTTP_CODE" != "202" ]; then
            echo "::error::Edge Add-ons package upload failed (HTTP $UPLOAD_HTTP_CODE)"
            echo "Expected HTTP 202 (Accepted). Check EDGE_PRODUCT_ID and package validity."
            exit 1
          fi
          echo "✓ Edge package uploaded to draft submission"

          # --- Step 3: Publish the submission ---
          echo "-> Publishing Edge submission..."
          PUBLISH_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.addons.microsoftedge.com/v1/products/${EDGE_PRODUCT_ID}/submissions" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json")

          if [ "$PUBLISH_HTTP_CODE" != "202" ] && [ "$PUBLISH_HTTP_CODE" != "201" ] && [ "$PUBLISH_HTTP_CODE" != "200" ]; then
            echo "::error::Edge Add-ons publish failed (HTTP $PUBLISH_HTTP_CODE)"
            echo "Expected HTTP 202/201/200. Package was uploaded but not published."
            echo "The draft submission can be published manually from Edge Partner Center."
            exit 1
          fi
          echo "✓ Edge extension submitted for publishing"
